<h1>Football Scanning</h1>

<label>
  Green Players
</label>

<select id="greenCount">
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
</select>

<br><br>

<label>
  Duration (seconds)
</label>

<input
  id="duration"
  type="number"
  value="5"
  min="1"
/>

<br><br>

<button id="nextBtn">
  NEXT
</button>

<button id="autoBtn">
  AUTO
</button>

<button id="stopBtn">
  STOP
</button>

<h2 id="selectedPlayer"></h2>
