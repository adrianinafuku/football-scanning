<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Football Scanning - Coach</title>
  <link rel="stylesheet" href="coach.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: white;
      color: black;
    }

    button,
    select,
    input {
      font-size: 20px;
      margin: 10px;
    }
  </style>
</head>

<body>

  <h1>Football Scanning</h1>

  <label for="greenCount">
    Green Players
  </label>

  <select id="greenCount">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
  </select>

  <br><br>

  <label for="duration">
    Duration (seconds)
  </label>

  <input
    id="duration"
    type="number"
    value="5"
    min="1"
  />

  <br><br>

  <button id="nextBtn">
    NEXT
  </button>

  <button id="autoBtn">
    AUTO
  </button>

  <button id="stopBtn">
    STOP
  </button>

  <br><br>

  <h2 id="selectedPlayer">
    Waiting...
  </h2>

  <script type="module" src="coach.js"></script>

</body>
</html>
